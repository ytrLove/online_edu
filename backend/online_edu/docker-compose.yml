version: '3.8'

services:
  # Spring Boot 后端服务
  online_edu:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: online_edu_backed
    restart: always
    ports:
      - "8083:8083"
    networks:
      - app-network
    depends_on:
      mysql-container:
        condition: service_healthy


  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: online_edu_nginx
    ports:
      - "18084:18084"
      - "18085:18085"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - online_edu
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local